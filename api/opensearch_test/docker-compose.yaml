services:                                                                                                                                                              
  opensearch:                                                                                                                                                          
    image: opensearchproject/opensearch:latest
    container_name: opensearch                                                                                                                                         
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}                                                                                         
    mem_limit: 6g
    ulimits:
      memlock:                                                                                                                                                         
        soft: -1
        hard: -1
      nofile:
        soft: 65536                                                                                                                                                    
        hard: 65536
    volumes:                                                                                                                                                           
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - 9200:9200
      - 9600:9600
    networks:                                                                                                                                                          
      - opensearch-net
                                                                                                                                                                        
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    container_name: opensearch-dashboards
    ports:                                                                                                                                                             
      - 5601:5601
    environment:                                                                                                                                                       
      OPENSEARCH_HOSTS: '["https://opensearch:9200"]'
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    networks:                                                                                                                                                          
      - opensearch-net
                                                                                                                                                                        
  dashboards-init:
    image: curlimages/curl:latest
    container_name: dashboards-init
    depends_on:
      - opensearch-dashboards
    networks:
      - opensearch-net
    environment:
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    entrypoint:
      - sh
      - -c
      - |
        until curl -sk -o /dev/null -w '%{http_code}' http://opensearch-dashboards:5601/api/status -u admin:$$OPENSEARCH_INITIAL_ADMIN_PASSWORD | grep -q '200'; do
          echo 'Waiting for Dashboards...'; sleep 3;
        done
        curl -sk -c /tmp/cookie.txt -X POST http://opensearch-dashboards:5601/auth/login \
          -H 'Content-Type: application/json' \
          -H 'osd-xsrf: true' \
          -d "{\"username\":\"admin\",\"password\":\"$$OPENSEARCH_INITIAL_ADMIN_PASSWORD\"}"
        curl -sk -b /tmp/cookie.txt -X POST http://opensearch-dashboards:5601/api/saved_objects/index-pattern/github-issues \
          -H 'Content-Type: application/json' \
          -H 'osd-xsrf: true' \
          -d '{"attributes":{"title":"github-issues","timeFieldName":""}}' &&
        echo 'Index pattern created.'
    restart: on-failure

volumes:
  opensearch-data:

networks:
  opensearch-net: