global:
  scrape_interval: 10s

scrape_configs:
- job_name: vmagent
  static_configs:
  - targets:
    - vmagent:8429
- job_name: victoriametrics
  static_configs:
  - targets:
    - victoriametrics:8428
- job_name: 'core-service'
  metrics_path: '/actuator/prometheus'
  scrape_interval: 15s
  static_configs:
    - targets: ['%{HOST_IP}:8080']
- job_name: 'index-repo-worker-service'
  metrics_path: '/actuator/prometheus'
  scrape_interval: 15s
  static_configs:
    - targets: ['%{HOST_IP}:8081']
