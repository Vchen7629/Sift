services:                                                                                                                                                              
  opensearch:                                                                                                                                                          
    image: opensearchproject/opensearch:latest
    container_name: opensearch                                                                                                                                         
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}                                                                                         
    mem_limit: 6g
    ulimits:
      memlock:                                                                                                                                                         
        soft: -1
        hard: -1
      nofile:
        soft: 65536                                                                                                                                                    
        hard: 65536
    volumes:                                                                                                                                                           
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - 9200:9200
      - 9600:9600
    networks:                                                                                                                                                          
      - opensearch-net
                                                                                                                                                                        
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    container_name: opensearch-dashboards
    ports:
      - 5601:5601
    environment:
      OPENSEARCH_HOSTS: '["https://opensearch:9200"]'
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    networks:
      - opensearch-net
                                                                                                                                                                        
  dashboards-init:
    image: curlimages/curl:latest
    container_name: dashboards-init
    depends_on:
      - opensearch-dashboards
    networks:
      - opensearch-net
    environment:
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    entrypoint:
      - sh
      - -c
      - |
        until curl -sk -o /dev/null -w '%{http_code}' "http://admin:$$OPENSEARCH_INITIAL_ADMIN_PASSWORD@opensearch-dashboards:5601/api/saved_objects/_find?type=index-pattern" | grep -q '200'; do
          echo 'Waiting for saved objects service...'; sleep 3;
        done
        create_index_pattern() {
          PATTERN_ID="$1"
          curl -sk -c /tmp/cookie.txt -X POST http://opensearch-dashboards:5601/auth/login \
            -H 'Content-Type: application/json' \
            -H 'osd-xsrf: true' \
            -d "{\"username\":\"admin\",\"password\":\"$$OPENSEARCH_INITIAL_ADMIN_PASSWORD\"}"
          STATUS=$(curl -sk -b /tmp/cookie.txt -o /dev/null -w '%{http_code}' \
            -X POST http://opensearch-dashboards:5601/api/saved_objects/index-pattern/$$PATTERN_ID \
            -H 'Content-Type: application/json' \
            -H 'osd-xsrf: true' \
            -d "{\"attributes\":{\"title\":\"$$PATTERN_ID\",\"timeFieldName\":\"\"}}")
          echo "$$PATTERN_ID -> HTTP $$STATUS"
          [ "$$STATUS" = "200" ] || [ "$$STATUS" = "409" ]
        }
        until create_index_pattern user-repo; do echo 'Retrying user-repo...'; sleep 3; done
        until create_index_pattern dependency-changelog; do echo 'Retrying dependency-changelog...'; sleep 3; done
        until create_index_pattern dependency-issues; do echo 'Retrying dependency-issue...'; sleep 3; done
        until create_index_pattern job-status; do echo 'Retrying job-status...'; sleep 3; done
        echo 'Index patterns created.'
    restart: on-failure
  
  nats:
    image: nats:latest
    ports:
      - "4222:4222"   # client connections
      - "8222:8222"   # HTTP monitoring
    command: -js -sd /data -m 8222
    volumes:
      - nats_data:/data

  nats-init:
    image: natsio/nats-box:latest
    depends_on:
      - nats
    restart: "no"
    entrypoint:
      - sh
      - -c
      - |
        until nats stream ls --server nats://nats:4222 2>/dev/null; do
          echo 'waiting for nats...'; sleep 1;
        done
        sleep 1
        nats stream add sift-job-processing-stream \
          --server nats://nats:4222 \
          --subjects 'index-repo.subject.>' \
          --storage=file \
          --replicas=1 \
          --retention=workqueue \
          --max-msgs=-1 \
          --max-bytes=-1 \
          --max-age=24h \
          --discard=old \
          --dupe-window=2m \
          --defaults
  
  init-observability:
    image: busybox:latest
    user: root
    entrypoint:
      - "chown"
      - "10001:10001"
      - "/var/tempo"
    volumes:
      - ./tempo-data:/var/tempo
    networks:
      - observability-net
    profiles: ["observability"]

  tempo:
    image: grafana/tempo:2.10.5
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
      - ./tempo-data:/var/tempo
    ports:
      - "3200:3200" # tempo
      - "4317:4317" # otlp grpc
      - "4318:4318" # otlp http
    depends_on:
      - init-observability
    networks:
      - observability-net
    profiles: ["observability"]

  grafana:
    image: grafana/grafana:12.3.1@sha256:2175aaa91c96733d86d31cf270d5310b278654b03f5718c59de12a865380a31f
    volumes:
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor metricsSummary
      - GF_INSTALL_PLUGINS=https://storage.googleapis.com/integration-artifacts/grafana-exploretraces-app/grafana-exploretraces-app-latest.zip;grafana-traces-app
    ports:
      - "3000:3000"
    networks:
      - observability-net
    profiles: ["observability"]

volumes:
  opensearch-data:
  nats_data:

networks:
  opensearch-net:
  observability-net: